name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          target-branch: main

  release-dist:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ needs.release-please.outputs.release_created }}
    strategy:
      fail-fast: false
      matrix:
        font:
          - { key: all, suffix: '' }
          - { key: cdn, suffix: '-cdn-fonts' }
          - { key: firasans, suffix: '-firasans-only' }
          - { key: misans, suffix: '-misans-only' }
          - { key: pingfang, suffix: '-pingfang-only' }
          - { key: sarasa, suffix: '-sarasa-only' }
          - { key: none, suffix: '-no-fonts' }
        # The default (no-suffix) build drops the sing-box native API; the
        # -singbox variant includes it.
        singbox:
          - { enable: 'false', suffix: '' }
          - { enable: 'true', suffix: '-singbox-native' }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6

      - name: Build and Zip the dist folder
        env:
          FONT: ${{ matrix.font.key }}
          SINGBOX_NATIVE: ${{ matrix.singbox.enable }}
        run: |
          pnpm i
          pnpm run build
          zip -r dist${{ matrix.font.suffix }}${{ matrix.singbox.suffix }}.zip dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist${{ matrix.font.suffix }}${{ matrix.singbox.suffix }}.zip
          tag_name: ${{ needs.release-please.outputs.tag_name }}
