name: Build and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and sync (defaults to the latest release)'
        required: false

permissions:
  contents: write
  pull-requests: write

env:
  EXPECTED_ASSETS: >-
    dist.zip
    dist-cdn-fonts.zip
    dist-firasans-only.zip
    dist-misans-only.zip
    dist-pingfang-only.zip
    dist-sarasa-only.zip
    dist-no-fonts.zip

jobs:
  release-please:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          target-branch: main

  resolve-release:
    needs: release-please
    runs-on: ubuntu-latest
    if: ${{ always() }}
    outputs:
      should_build: ${{ steps.release.outputs.should_build }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      EVENT_NAME: ${{ github.event_name }}
      INPUT_TAG: ${{ github.event.inputs.tag }}
      REF_NAME: ${{ github.ref_name }}
      REF_TYPE: ${{ github.ref_type }}
      RELEASE_PLEASE_CREATED: ${{ needs.release-please.outputs.release_created }}
      RELEASE_PLEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - name: Resolve release tag
        id: release
        run: |
          TAG=""
          SHOULD_BUILD=false

          if [ "$REF_TYPE" = "tag" ]; then
            TAG="$REF_NAME"
            SHOULD_BUILD=true
          elif [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
            SHOULD_BUILD=true
          elif [ "$RELEASE_PLEASE_CREATED" = "true" ]; then
            TAG="$RELEASE_PLEASE_TAG"
            SHOULD_BUILD=true
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q .tagName)
            SHOULD_BUILD=true
          fi

          if [ -n "$TAG" ] && ! echo "$TAG" | grep -q '^v' && echo "$TAG" | grep -Eq '^[0-9]'; then
            TAG="v$TAG"
          fi

          if [ -n "$TAG" ] && ! echo "$TAG" | grep -Eq '^v[0-9]'; then
            echo "Tag must start with a version prefix like v1.2.3: $TAG" >&2
            exit 1
          fi

          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"

  release-dist:
    needs: resolve-release
    runs-on: ubuntu-latest
    if: ${{ always() && needs.resolve-release.outputs.should_build == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        font:
          - { key: all, suffix: '' }
          - { key: cdn, suffix: '-cdn-fonts' }
          - { key: firasans, suffix: '-firasans-only' }
          - { key: misans, suffix: '-misans-only' }
          - { key: pingfang, suffix: '-pingfang-only' }
          - { key: sarasa, suffix: '-sarasa-only' }
          - { key: none, suffix: '-no-fonts' }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve-release.outputs.tag_name }}
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6

      - name: Build and Zip the dist folder
        env:
          FONT: ${{ matrix.font.key }}
        run: |
          pnpm i
          pnpm run build
          zip -r dist${{ matrix.font.suffix }}.zip dist

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist${{ matrix.font.suffix }}.zip
          tag_name: ${{ needs.resolve-release.outputs.tag_name }}
          overwrite_files: true

  sync-gh-pages:
    needs:
      - resolve-release
      - release-dist
    runs-on: ubuntu-latest
    if: ${{ always() && needs.resolve-release.outputs.should_build == 'true' && needs.release-dist.result == 'success' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      # release-dist's font-variant matrix uploads assets one at a time, so
      # wait until every expected zip has landed before mirroring the set.
      - name: Wait for all build assets to be uploaded
        run: |
          missing=1
          for i in $(seq 1 30); do
            names=$(gh release view "${{ needs.resolve-release.outputs.tag_name }}" --repo "${{ github.repository }}" --json assets -q '.assets[].name')
            missing=0
            for f in $EXPECTED_ASSETS; do
              echo "$names" | grep -qx "$f" || missing=1
            done
            [ "$missing" -eq 0 ] && break
            echo "Waiting for release assets... ($i/30)"
            sleep 20
          done
          if [ "$missing" -ne 0 ]; then
            echo "Timed out waiting for release assets" >&2
            exit 1
          fi

      - name: Download release assets
        run: |
          mkdir -p gh-pages-assets
          gh release download "${{ needs.resolve-release.outputs.tag_name }}" --repo "${{ github.repository }}" \
            --dir gh-pages-assets --clobber --pattern '*.zip'
          ls -la gh-pages-assets

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-assets
          keep_files: true

      - name: Purge jsDelivr cache
        run: |
          for f in gh-pages-assets/*.zip; do
            name=$(basename "$f")
            curl -fsS "https://purge.jsdelivr.net/gh/${{ github.repository }}@gh-pages/$name" >/dev/null || true
          done
